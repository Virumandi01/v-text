<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v-text // Secure Scanner Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans h-screen flex flex-col justify-between p-4">

    <div class="flex items-center justify-between pb-4 border-b border-gray-800">
        <button onclick="window.location.href='/'" class="text-xs font-mono text-gray-400 bg-gray-900 border border-gray-800 px-3 py-2 rounded-xl hover:bg-gray-800 transition-all">
            ← Return
        </button>
        <span class="text-xs font-mono tracking-widest text-indigo-400 uppercase font-bold">QR Optical Sync</span>
    </div>

    <div class="flex-grow flex flex-col items-center justify-center my-6">
        <div class="w-full max-w-sm bg-gray-900 border border-gray-800 rounded-2xl p-4 shadow-2xl relative overflow-hidden">
            
            <div id="camera-reader-box" class="w-full bg-black rounded-xl overflow-hidden border border-gray-800 aspect-square"></div>
            
            <div id="scanner-hud-status" class="mt-4 text-center">
                <p class="text-xs font-mono text-indigo-400 animate-pulse">Requesting system camera lens configuration...</p>
            </div>
        </div>
    </div>

    <div class="bg-gray-900/40 border border-gray-800/60 rounded-xl p-3 text-center">
        <p class="text-[10px] text-gray-500 font-mono">Keep desktop QR inside the targeting brackets. Data transfers exclusively through volatile transit arrays.</p>
    </div>

    <script>
        const socket = io();
        let html5QrScanner = null;

        // Verify local existence of authentication token prior to initiating camera pipeline
        const localSecureToken = localStorage.getItem('v_text_token');
        if (!localSecureToken) {
            alert("No secure identity token signature discovered on this node. Please generate an identity key first.");
            window.location.href = '/';
        }

        window.onload = function() {
            // Setup backend pipeline pairing checks
            socket.emit('authenticate', localSecureToken);
            
            // Fire up mobile camera array
            initializeOpticalScanner();
        };

        function initializeOpticalScanner() {
            const hud = document.getElementById('scanner-hud-status');
            
            // Instantiating the reader module config
            html5QrScanner = new Html5Qrcode("camera-reader-box");
            
            const config = { 
                fps: 15, 
                qrbox: (width, height) => {
                    return { width: Math.min(width * 0.7, 250), height: Math.min(height * 0.7, 250) };
                }
            };

            // Command camera target to optimize for rear environment tracking matrix
            html5QrScanner.start(
                { facingMode: "environment" }, 
                config, 
                onQrCodeScannedSuccess,
                onQrCodeScanError
            ).then(() => {
                hud.innerHTML = `<p class="text-xs font-mono text-emerald-400 flex items-center justify-center gap-1.5"><span class="h-1.5 w-1.5 bg-emerald-400 rounded-full animate-ping"></span> Targeting array locked. Align QR Code.</p>`;
            }).catch(err => {
                console.error("Camera Init Fault:", err);
                hud.innerHTML = `<p class="text-xs font-mono text-red-400">Camera initialization denied. Grant browser lens permissions.</p>`;
            });
        }

        function onQrCodeScannedSuccess(decodedText, decodedResult) {
            const hud = document.getElementById('scanner-hud-status');
            
            try {
                // Parse the target URL pattern generated by server: http://PAIR_VIA_MOBILE_INTERFACE/?session=XXXXXX
                const urlObj = new URL(decodedText);
                const targetSessionId = urlObj.searchParams.get("session");

                if (targetSessionId) {
                    // Turn off scanner hardware instantly to prevent parallel data race anomalies
                    html5QrScanner.stop().then(() => {
                        hud.innerHTML = `<p class="text-xs font-mono text-amber-400">Signature locked. Syncing secure token payload...</p>`;
                        
                        // Fire pairing request containing token to target session over current WebSocket
                        socket.emit('submit_pairing_from_mobile', {
                            sessionId: targetSessionId,
                            mobileToken: localSecureToken
                        });
                    });
                }
            } catch (e) {
                // Ignore scans that read random QR codes not belonging to v-text environment
            }
        }

        function onQrCodeScanError(errorMessage) {
            // Silent error suppression to avoid spamming layout frames during live frames seeking matrix
        }

        // Catch validation reply loops from central memory relay
        socket.on('pairing_success', () => {
            // Signal confirmation and route back to baseline communication terminal layout
            alert("Pairing link verified. Desktop terminal unlocked successfully.");
            window.location.href = '/';
        });

        socket.on('pairing_fault', (data) => {
            alert(`Pairing Failed: ${data.message}`);
            window.location.reload();
        });
    </script>
</body>
</html>
